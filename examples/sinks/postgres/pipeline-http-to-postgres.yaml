# ════════════════════════════════════════════════════════════
# Pipeline: Beer API (No Auth) -> PostgreSQL
# Source: Local FastAPI — no authentication
# ════════════════════════════════════════════════════════════
apiVersion: mako/v1
kind: Pipeline

pipeline:
  name: beer-to-postgres
  description: "Fetch beer data from local API (no auth) and load to PostgreSQL"
  owner: data-team

  source:
    type: http
    config:
      url: http://localhost:8000/beer/
      method: GET
      auth_type: none
      response_type: json
      data_path: data
      pagination_type: offset
      pagination_limit_param: limit
      pagination_limit: 100
      pagination_offset_param: skip
      pagination_total_path: total
      rate_limit_rps: 10
      timeout: 30s

  sink:
    type: postgres
    database: mako
    schema: public
    table: beer
    flatten: true
    batch:
      size: 200
      interval: 5s

  monitoring:
    freshnessSLA: 5m
    metrics:
      enabled: true
      port: 9090
