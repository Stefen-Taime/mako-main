# ════════════════════════════════════════════════════════════
# Dimension: dim_rate_code (6 rows — static reference data)
# ════════════════════════════════════════════════════════════
apiVersion: mako/v1
kind: Pipeline

pipeline:
  name: dim-rate-code
  description: "Build rate code dimension table"
  owner: data-team

  source:
    type: duckdb
    config:
      database: ":memory:"
      query: >
        SELECT 1 AS rate_code_id, 'Standard rate' AS rate_code_name
        UNION ALL SELECT 2, 'JFK'
        UNION ALL SELECT 3, 'Newark'
        UNION ALL SELECT 4, 'Nassau/Westchester'
        UNION ALL SELECT 5, 'Negotiated fare'
        UNION ALL SELECT 99, 'Group ride'

  sink:
    type: duckdb
    database: /tmp/nyc_tlc_warehouse.duckdb
    table: dim_rate_code
    config:
      create_table: true
    batch:
      size: 100
      interval: 5s

  monitoring:
    metrics:
      enabled: true
      port: 9112
