# ════════════════════════════════════════════════════════════
# Pipeline: NYC TLC Yellow Taxi -> GCS (Parquet)
# Step 1 - EXTRACT: Download raw Parquet from NYC TLC public
#          dataset and store in GCS with data quality checks.
#
# Vault secrets:
#   - GCS: secret/data/mako/gcs (bucket, project)
# ════════════════════════════════════════════════════════════
apiVersion: mako/v1
kind: Pipeline

pipeline:
  name: tlc-yellow-to-gcs-raw
  description: "Ingest NYC TLC Yellow Taxi trip data (Parquet) into GCS with row-level quality checks"
  owner: data-team
  labels:
    domain: transportation
    dataset: nyc-tlc
    taxi_type: yellow
    stage: extract

  vault:
    path: secret/data/mako
    ttl: 5m

  source:
    type: file
    config:
      path: https://d37ci6vzurychx.cloudfront.net/trip-data/yellow_tripdata_2024-01.parquet
      format: parquet
      channel_buffer: 20000

  transforms:
    # --- DATA QUALITY SHIELD ---
    - name: quality-gate
      type: dq_check
      on_failure: drop
      checks:
        - column: VendorID
          rule: not_null
        - column: tpep_pickup_datetime
          rule: not_null
        - column: trip_distance
          rule: range
          min: 0
        - column: total_amount
          rule: range
          min: 0
        - column: passenger_count
          rule: range
          min: 0
          max: 9

    # Enrich with fare category for downstream analytics
    - name: enrich-fare-category
      type: sql
      query: "SELECT *, CASE WHEN total_amount > '50' THEN 'premium' WHEN total_amount > '20' THEN 'standard' ELSE 'economy' END as fare_category FROM events"

  sink:
    type: gcs
    bucket: mako-pipeline-data
    prefix: raw/nyc_tlc/yellow/2024/01
    format: parquet
    config:
      vault_path: secret/data/mako/gcs
      compression: snappy
    batch:
      size: 5000
      interval: 10s

  monitoring:
    freshnessSLA: 10m
    alertOnError: true
    alertOnSLA: true
    alertOnComplete: true
    metrics:
      enabled: true
      port: 9090
