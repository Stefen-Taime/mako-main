# ════════════════════════════════════════════════════════════
# Pipeline: GCS HVFHV (Uber/Lyft) Parquet -> Snowflake Staging
# LOAD: Read High Volume FHV data from GCS and load into
#       Snowflake staging table (STG_HVFHV_TRIPS).
#
# HVFHV has different column names: trip_miles, trip_time,
# base_passenger_fare, tips (not tip_amount), driver_pay.
#
# Vault secrets:
#   - Snowflake: secret/data/mako/snowflake
# ════════════════════════════════════════════════════════════
apiVersion: mako/v1
kind: Pipeline

pipeline:
  name: gcs-hvfhv-to-snowflake-staging
  description: "Load NYC TLC High Volume FHV (Uber/Lyft) data from GCS into Snowflake staging"
  owner: data-team
  labels:
    domain: transportation
    dataset: nyc-tlc
    taxi_type: hvfhv
    stage: staging

  vault:
    path: secret/data/mako
    ttl: 5m

  source:
    type: duckdb
    config:
      database: ":memory:"
      vault_path: secret/data/mako/gcs
      query: >
        SELECT
          hvfhs_license_num                                  AS license_num,
          dispatching_base_num                               AS dispatching_base,
          pickup_datetime                                    AS pickup_datetime,
          dropoff_datetime                                   AS dropoff_datetime,
          CAST(PULocationID AS INTEGER)                      AS pu_location_id,
          CAST(DOLocationID AS INTEGER)                      AS do_location_id,
          ROUND(trip_miles, 2)                               AS trip_distance,
          ROUND(trip_time / 60.0, 1)                         AS trip_duration_minutes,
          ROUND(COALESCE(base_passenger_fare, 0), 2)         AS fare_amount,
          ROUND(COALESCE(tolls, 0), 2)                       AS tolls_amount,
          ROUND(COALESCE(bcf, 0), 2)                         AS bcf,
          ROUND(COALESCE(sales_tax, 0), 2)                   AS sales_tax,
          ROUND(COALESCE(congestion_surcharge, 0), 2)        AS congestion_surcharge,
          ROUND(COALESCE(airport_fee, 0), 2)                 AS airport_fee,
          ROUND(COALESCE(tips, 0), 2)                        AS tip_amount,
          ROUND(COALESCE(driver_pay, 0), 2)                  AS driver_pay,
          ROUND(COALESCE(base_passenger_fare, 0) + COALESCE(tolls, 0) + COALESCE(bcf, 0) + COALESCE(sales_tax, 0) + COALESCE(congestion_surcharge, 0) + COALESCE(airport_fee, 0) + COALESCE(tips, 0), 2) AS total_amount,
          shared_request_flag                                AS shared_request_flag,
          shared_match_flag                                  AS shared_match_flag,
          wav_request_flag                                   AS wav_request_flag,
          wav_match_flag                                     AS wav_match_flag,
          'hvfhv'                                            AS taxi_type,
          fare_category
        FROM read_parquet('gs://mako-pipeline-data/raw/nyc_tlc/hvfhv/2024/01/**/*.parquet', union_by_name=True)
        WHERE pickup_datetime IS NOT NULL
          AND dropoff_datetime IS NOT NULL
          AND base_passenger_fare >= 0
          AND trip_miles >= 0
        LIMIT 5000
      batch_size: 2000

  transforms:
    - name: quality-check
      type: dq_check
      on_failure: drop
      checks:
        - column: license_num
          rule: not_null
        - column: pickup_datetime
          rule: not_null
        - column: trip_distance
          rule: range
          min: 0
          max: 500
        - column: total_amount
          rule: range
          min: 0
          max: 10000

  sink:
    type: snowflake
    database: ANALYTICS
    schema: RAW
    table: STG_HVFHV_TRIPS
    flatten: true
    config:
      vault_path: secret/data/mako/snowflake
    batch:
      size: 5000
      interval: 10s

  monitoring:
    freshnessSLA: 15m
    alertOnError: true
    alertOnComplete: true
    metrics:
      enabled: true
      port: 9090
