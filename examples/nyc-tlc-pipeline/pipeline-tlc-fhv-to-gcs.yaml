# ════════════════════════════════════════════════════════════
# Pipeline: NYC TLC For-Hire Vehicle (FHV) -> GCS (Parquet)
# EXTRACT: Download raw FHV Parquet from NYC TLC.
#
# FHV data is minimal: base license, pickup/dropoff times,
# location IDs, shared ride flag. No fare/distance data.
#
# Vault secrets:
#   - GCS: secret/data/mako/gcs (bucket, project)
# ════════════════════════════════════════════════════════════
apiVersion: mako/v1
kind: Pipeline

pipeline:
  name: tlc-fhv-to-gcs-raw
  description: "Ingest NYC TLC FHV trip data (Parquet) into GCS"
  owner: data-team
  labels:
    domain: transportation
    dataset: nyc-tlc
    taxi_type: fhv
    stage: extract

  vault:
    path: secret/data/mako
    ttl: 5m

  source:
    type: file
    config:
      path: https://d37ci6vzurychx.cloudfront.net/trip-data/fhv_tripdata_2024-01.parquet
      format: parquet
      channel_buffer: 20000

  transforms:
    - name: quality-gate
      type: dq_check
      on_failure: drop
      checks:
        - column: dispatching_base_num
          rule: not_null
        - column: pickup_datetime
          rule: not_null

  sink:
    type: gcs
    bucket: mako-pipeline-data
    prefix: raw/nyc_tlc/fhv/2024/01
    format: parquet
    config:
      vault_path: secret/data/mako/gcs
      compression: snappy
    batch:
      size: 5000
      interval: 10s

  monitoring:
    freshnessSLA: 10m
    alertOnError: true
    alertOnComplete: true
    metrics:
      enabled: true
      port: 9090
