# ════════════════════════════════════════════════════════════
# Pipeline: Movies API (OAuth2 Client Credentials) -> PostgreSQL
# Source: Local FastAPI — OAuth2 client credentials flow
# ════════════════════════════════════════════════════════════
apiVersion: mako/v1
kind: Pipeline

pipeline:
  name: movies-oauth2-to-postgres
  description: "Fetch movies data from local API with OAuth2 client credentials and load to PostgreSQL"
  owner: data-team

  source:
    type: http
    config:
      url: http://localhost:8000/movies/
      method: GET
      auth_type: oauth2
      oauth2_token_url: http://localhost:8000/oauth2/token
      oauth2_client_id: my-client-id
      oauth2_client_secret: my-client-secret
      oauth2_content_type: json
      response_type: json
      data_path: data
      pagination_type: offset
      pagination_limit_param: limit
      pagination_limit: 100
      pagination_offset_param: skip
      pagination_total_path: total
      rate_limit_rps: 10
      timeout: 30s

  transforms:
    - name: drop_internal
      type: drop_fields
      fields: [dt_current_timestamp]

  sink:
    type: postgres
    database: mako
    schema: public
    table: movies_oauth2
    flatten: true
    batch:
      size: 200
      interval: 5s

  monitoring:
    freshnessSLA: 5m
    metrics:
      enabled: true
      port: 9090
