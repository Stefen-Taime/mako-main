# ════════════════════════════════════════════════════════════
# Pipeline: Restaurant API (Basic Auth) -> PostgreSQL
# Source: Local FastAPI — Basic authentication
# ════════════════════════════════════════════════════════════
apiVersion: mako/v1
kind: Pipeline

pipeline:
  name: restaurant-basic-to-postgres
  description: "Fetch restaurant data from local API with Basic auth and load to PostgreSQL"
  owner: data-team

  source:
    type: http
    config:
      url: http://localhost:8000/restaurant/basic/
      method: GET
      auth_type: basic
      auth_user: admin
      auth_password: admin123
      response_type: json
      data_path: data
      pagination_type: offset
      pagination_limit_param: limit
      pagination_limit: 100
      pagination_offset_param: skip
      pagination_total_path: total
      rate_limit_rps: 10
      timeout: 30s

  sink:
    type: postgres
    database: mako
    schema: public
    table: restaurant_basic
    flatten: true
    batch:
      size: 200
      interval: 5s

  monitoring:
    freshnessSLA: 5m
    metrics:
      enabled: true
      port: 9090
