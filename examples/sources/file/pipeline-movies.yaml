# ════════════════════════════════════════════════════════════
# Pipeline: Movies -> PostgreSQL
# Source: open-source-data (GitHub raw URL)
# ════════════════════════════════════════════════════════════
apiVersion: mako/v1
kind: Pipeline

pipeline:
  name: movies-to-postgres
  description: "Ingest movies data from GitHub and load to PostgreSQL"
  owner: data-team

  source:
    type: file
    config:
      path: https://raw.githubusercontent.com/Stefen-Taime/open-source-data/main/movies/json/json_bank_20240116_1.json
      format: json

  transforms:
    - name: drop_internal
      type: drop_fields
      fields: [dt_current_timestamp]

  sink:
    type: postgres
    database: mako
    schema: public
    table: movies_flat
    flatten: true
    batch:
      size: 500
      interval: 5s
